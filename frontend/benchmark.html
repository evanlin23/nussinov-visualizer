<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nussinov Benchmark</title>
    <script src="https://cdn.plot.ly/plotly-2.31.0.min.js" charset="utf-8"></script>
    <script src="nussinov.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fafafa;
            color: #171717;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }
        h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 1.5rem; }
        #run-btn {
            padding: 0.75rem 2rem;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 1.5rem;
        }
        #run-btn:hover { background: #333; }
        #run-btn:disabled { background: #999; cursor: not-allowed; }
        #log {
            font-family: monospace;
            font-size: 0.8rem;
            background: #fff;
            border: 1px solid #eaeaea;
            border-radius: 6px;
            padding: 1rem;
            width: 100%;
            max-width: 700px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre;
            margin-bottom: 1.5rem;
        }
        #plot { width: 100%; max-width: 800px; }
    </style>
</head>
<body>
    <h1>Nussinov Algorithm Performance Benchmark</h1>
    <p>Sequences from length 10 to 200, measuring DP table creation and full traceback times.</p>
    <button id="run-btn" onclick="runBenchmark()">Run Benchmark</button>
    <div id="log"></div>
    <div id="plot"></div>

    <script>
        function generateRandomRNA(length) {
            const bases = ['A', 'C', 'G', 'U'];
            let seq = '';
            for (let i = 0; i < length; i++) {
                seq += bases[Math.floor(Math.random() * bases.length)];
            }
            return seq;
        }

        function log(msg) {
            const el = document.getElementById('log');
            el.textContent += msg + '\n';
            el.scrollTop = el.scrollHeight;
        }

        async function runBenchmark() {
            const btn = document.getElementById('run-btn');
            btn.disabled = true;
            btn.textContent = 'Running...';

            const logEl = document.getElementById('log');
            logEl.textContent = '';

            const testWeights = {
                'A': { 'A': 0, 'C': 0, 'G': 0, 'U': 1, 'I': 0 },
                'C': { 'A': 0, 'C': 0, 'G': 1, 'U': 0, 'I': 0 },
                'G': { 'A': 0, 'C': 1, 'G': 0, 'U': 0, 'I': 0 },
                'U': { 'A': 1, 'C': 0, 'G': 0, 'U': 0, 'I': 0 },
                'I': { 'A': 0, 'C': 0, 'G': 0, 'U': 0, 'I': 0 }
            };

            const lengths = [];
            for (let l = 10; l <= 200; l += 10) lengths.push(l);

            const dpTimes = [];
            const totalTimes = [];

            log('Starting Benchmark...');
            log(`${'Length'.padEnd(10)} | ${'DP Time (ms)'.padEnd(15)} | ${'Total Time (ms)'.padEnd(15)}`);
            log('-'.repeat(45));

            // Use setTimeout to yield to the browser between iterations
            for (const L of lengths) {
                await new Promise(resolve => setTimeout(resolve, 0));

                const seq = generateRandomRNA(L);

                const startDP = performance.now();
                const dp = getDpTable(seq, 3, testWeights);
                const dpTime = performance.now() - startDP;

                const startTotal = performance.now();
                suboptimalTraceback(dp, seq, 3, testWeights, 0.0, 100000);
                const totalTime = (performance.now() - startTotal) + dpTime;

                dpTimes.push(dpTime);
                totalTimes.push(totalTime);

                log(`${String(L).padEnd(10)} | ${dpTime.toFixed(2).padEnd(15)} | ${totalTime.toFixed(2).padEnd(15)}`);
            }

            log('\nBenchmark complete.');

            Plotly.newPlot('plot', [
                {
                    x: lengths,
                    y: dpTimes,
                    name: 'DP Table Creation (O(N\u00B3))',
                    mode: 'lines+markers',
                    marker: { symbol: 'circle' },
                    line: { color: 'blue' }
                },
                {
                    x: lengths,
                    y: totalTimes,
                    name: 'DP + Traceback',
                    mode: 'lines+markers',
                    marker: { symbol: 'x' },
                    line: { color: 'red', dash: 'dash' }
                }
            ], {
                title: 'Nussinov Algorithm Performance Benchmark',
                xaxis: { title: 'RNA Sequence Length' },
                yaxis: { title: 'Runtime (ms)' },
                legend: { x: 0.05, y: 0.95 },
                margin: { t: 50, r: 30, b: 50, l: 60 },
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)'
            }, { responsive: true });

            btn.disabled = false;
            btn.textContent = 'Run Benchmark';
        }
    </script>
</body>
</html>
